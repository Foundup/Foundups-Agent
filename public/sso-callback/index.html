<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in... | Foundups</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #08080f;
      color: #e4e2ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(124, 92, 252, 0.2);
      border-top-color: #7c5cfc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    p {
      color: rgba(228, 226, 236, 0.6);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h1>Completing sign in...</h1>
    <p>You'll be redirected shortly.</p>
  </div>

  <!-- Clerk SDK - handles OAuth callback -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_c3VwcmVtZS1veXN0ZXItMjAuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://supreme-oyster-20.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    // FoundUPS Clerk Theme
    const FOUNDUPS_CLERK_APPEARANCE = {
      variables: {
        colorPrimary: '#7c5cfc',
        colorBackground: '#0a0a0f',
        colorInputBackground: '#12121a',
        colorText: '#e4e2ec'
      },
      elements: {
        card: { backgroundColor: '#0e0e1c', border: '1px solid rgba(124, 92, 252, 0.2)', borderRadius: '16px' }
      }
    };

    window.addEventListener('load', async () => {
      // Wait for Clerk SDK to be available
      while (!window.Clerk) {
        await new Promise(resolve => setTimeout(resolve, 50));
      }

      try {
        // Initialize Clerk - this automatically processes any OAuth callback tokens
        await window.Clerk.load({ appearance: FOUNDUPS_CLERK_APPEARANCE });

        // Give Clerk a moment to establish the session
        await new Promise(resolve => setTimeout(resolve, 500));

        // Check if user session is now established
        if (window.Clerk.user) {
          // Success - go to member area
          window.location.href = '/member/';
        } else {
          // Try handleRedirectCallback for any pending OAuth
          try {
            await window.Clerk.handleRedirectCallback();
            // Check again after handling callback
            if (window.Clerk.user) {
              window.location.href = '/member/';
              return;
            }
          } catch (e) {
            console.log('No redirect callback to handle:', e.message);
          }
          // Still no user - redirect to landing
          window.location.href = '/?auth=failed';
        }
      } catch (err) {
        console.error('SSO callback error:', err);
        window.location.href = '/?auth=error&msg=' + encodeURIComponent(err.message || 'unknown');
      }
    });
  </script>
</body>
</html>
